name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1 — LINT
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8==7.0.0

      - name: Lint Python — API
        run: flake8 api/main.py --max-line-length=100

      - name: Lint Python — Worker
        run: flake8 worker/worker.py worker/healthcheck.py --max-line-length=100

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Lint JavaScript
        run: cd frontend && npx eslint app.js

      - name: Install hadolint
        run: |
          curl -sSfL \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  # ─────────────────────────────────────────────
  # STAGE 2 — TEST
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API and test dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest==8.1.1 pytest-cov==5.0.0 httpx==0.27.0

      - name: Run unit tests with coverage
        working-directory: api
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml:../coverage.xml \
            --cov-report=html:../htmlcov \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  # ─────────────────────────────────────────────
  # STAGE 3 — BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Build and push API image
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} \
                       -t localhost:5000/api:latest api/
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

      - name: Build and push Worker image
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} \
                       -t localhost:5000/worker:latest worker/
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      - name: Build and push Frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} \
                       -t localhost:5000/frontend:latest frontend/
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

  # ─────────────────────────────────────────────
  # STAGE 4 — SECURITY SCAN
  # ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild images for scanning
        run: |
          docker build -t scan/api:latest api/
          docker build -t scan/worker:latest worker/
          docker build -t scan/frontend:latest frontend/

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb \
            $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y trivy

      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL --ignore-unfixed \
            --format sarif \
            --output trivy-api.sarif \
            scan/api:latest

      - name: Scan Worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL --ignore-unfixed \
            --format sarif \
            --output trivy-worker.sarif \
            scan/worker:latest

      - name: Scan Frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL --ignore-unfixed \
            --format sarif \
            --output trivy-frontend.sarif \
            scan/frontend:latest

      - name: Upload Trivy SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-results
          path: trivy-*.sarif

  # ─────────────────────────────────────────────
  # STAGE 5 — INTEGRATION TEST
  # ─────────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for stack
        run: |
          echo "REDIS_PASSWORD=integrationtestpass123" > .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Build and start full stack
        run: docker compose up -d --build

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for frontend health endpoint..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:3000/health; do
               echo "Not ready yet...";
               sleep 5;
             done'
          echo "Stack is healthy."

      - name: Submit a job and poll until completed
        run: |
          JOB_RESP=$(curl -sf -X POST http://localhost:3000/submit)
          echo "API response: $JOB_RESP"
          JOB_ID=$(echo "$JOB_RESP" | python3 -c \
            "import sys, json; print(json.load(sys.stdin)['job_id'])")
          echo "Submitted job ID: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS_RESP=$(curl -sf "http://localhost:3000/status/$JOB_ID")
            STATUS=$(echo "$STATUS_RESP" | python3 -c \
              "import sys, json; print(json.load(sys.stdin)['status'])")
            echo "Poll $i — status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "✅ Job completed successfully."
              exit 0
            fi
            sleep 2
          done

          echo "❌ Job did not reach 'completed' within 60 seconds."
          exit 1

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

  # ─────────────────────────────────────────────
  # STAGE 6 — DEPLOY  (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key

      - name: Rolling update on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              'bash -s' << 'REMOTE'
            set -e
            cd ~/hng14-stage2-devops
            git pull origin main

            for SERVICE in api worker frontend; do
              echo "==> Rolling update: $SERVICE"

              # Build new image
              docker compose build "$SERVICE"

              # Get current running container ID (may be empty on first deploy)
              OLD_ID=$(docker compose ps -q "$SERVICE" 2>/dev/null || true)

              # Start the new container alongside the old one
              docker compose up -d --no-deps --scale "$SERVICE=2" "$SERVICE" \
                2>/dev/null || true

              # Find the new container (not the old one)
              NEW_ID=$(docker compose ps -q "$SERVICE" 2>/dev/null \
                | grep -v "$OLD_ID" | head -1)

              if [ -z "$NEW_ID" ]; then
                echo "Could not identify new container for $SERVICE — aborting."
                exit 1
              fi

              # Wait up to 60 s for the new container to pass its health check
              ELAPSED=0
              while [ $ELAPSED -lt 60 ]; do
                HEALTH=$(docker inspect \
                  --format='{{.State.Health.Status}}' "$NEW_ID" 2>/dev/null \
                  || echo "none")
                echo "  health: $HEALTH (${ELAPSED}s)"
                [ "$HEALTH" = "healthy" ] && break
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done

              if [ "$HEALTH" != "healthy" ]; then
                echo "New $SERVICE container failed health check. Leaving old one running."
                docker stop "$NEW_ID" 2>/dev/null || true
                docker rm   "$NEW_ID" 2>/dev/null || true
                exit 1
              fi

              # New container is healthy — stop and remove the old one
              if [ -n "$OLD_ID" ]; then
                docker stop "$OLD_ID"
                docker rm   "$OLD_ID"
              fi

              # Scale back down to 1 replica in compose state
              docker compose up -d --no-deps --scale "$SERVICE=1" "$SERVICE" \
                2>/dev/null || true

              echo "  $SERVICE updated successfully."
            done
          REMOTE

      - name: Clean up SSH key
        if: always()
        run: rm -f /tmp/deploy_key
